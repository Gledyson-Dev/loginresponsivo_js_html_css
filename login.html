<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

</head>
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link rel="stylesheet" href="style.css">
<body>
    <main class="container">
        <form onsubmit="log(event)">
           
            <h1>Login</h1>
            
            <div class="input-box">
                <input placeholder="Email" type="email" id="email">
                <i class="bx bxs-user"></i>
            </div>
           
            <div class="input-box">
                <input placeholder="Senha" type="password" id="senha">
                <i class="bx bxs-lock-alt"></i>
            </div>
            
            <div class="lembrar-login">
                <label>
                    <input type="checkbox" id="lembrar">
                    Lembrar Senha
                </label>
                <a href="#">Esqueci a Senha</a>
                </div>
            
            <button onclick="log()" class="login" id="login" >Login</button>
            
            <div class="register-link">
                <p>Nao tem uma conta? <a href="./cadastro.html">Cadastre-se</a></p>
            </div>


        </form>


    </main>
 <script src="script.js"></script>
</body>

</html>
